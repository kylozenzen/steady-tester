<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Planet Strength</title>
  <meta name="application-name" content="Planet Strength" />
  <meta name="apple-mobile-web-app-title" content="Planet Strength" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Planet Strength is a calm, simple tracker for Today's Workout." />
  <meta name="theme-color" content="#facc15" />
  <meta name="color-scheme" content="dark" />
  <link id="manifest-placeholder" rel="manifest" href="manifest.json" />
  <link id="app-icon" rel="icon" href="icons/icon-192.svg" />
  <link id="apple-touch-icon" rel="apple-touch-icon" href="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script>tailwind = { disableWarning: true }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Nobody Studios Theme — must come AFTER Tailwind to override -->
  <link rel="stylesheet" href="nobody-theme.css" />
  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="app-shell">

  <!-- Loading screen — hidden once React mounts -->
  <div id="ps-loading">
    <div id="ps-loading-img"></div>
    <div id="ps-loading-content">
      <div id="ps-loading-brand">PLANET STRENGTH</div>
      <div id="ps-loading-sub">Built by Nobody.</div>
    </div>
  </div>

  <div id="root"></div>
  <div id="install-prompt" aria-live="polite"></div>

  <!-- Data files (plain JS, no JSX needed) -->
  <script src="data/constants.js"></script>
  <script src="data/copy.js"></script>
  <script src="data/equipment.js"></script>
  <script src="data/workoutPlans.js"></script>

  <!-- Custom hooks (plain JS, uses global React) -->
  <script src="hooks/storage.js"></script>
  <script src="hooks/useDebounce.js"></script>
  <script src="hooks/usePersistedState.js"></script>
  <script src="hooks/useToast.js"></script>
  <script src="hooks/useModal.js"></script>

  <!-- Contexts (JSX, needs Babel) -->
  <script type="text/babel" src="hooks/SettingsContext.jsx"></script>

  <!-- Components (JSX, needs Babel) -->
  <script type="text/babel" src="components/Icon.jsx"></script>

  <!-- App logic -->
  <script type="text/babel" data-presets="env,react" src="script.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
