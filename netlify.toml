# ── Steady — Netlify Build Config ────────────────────────────────────────────
# Landing page at /, app shell and PWA live under /app/

[build]
  publish = "."
  command = """
    echo '=== Steady Build ===' &&
    BUILD_ID=$(date +%s) &&
    echo "Build ID: $BUILD_ID" &&
    echo '--- Stamping service worker cache version...' &&
    sed -i "s/__BUILD_ID__/$BUILD_ID/g" app/sw.js &&
    echo '=== Build complete ==='
  """

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Ensure boot-critical assets revalidate to avoid stale deploy mismatches.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app/script.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/app/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
