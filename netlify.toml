# ── Steady — Netlify Build Config ────────────────────────────────────────────
# Keep deploys deterministic: no runtime rewrites of index/script paths.

[build]
  publish = "."
  command = """
    echo '=== Steady Build ===' &&
    BUILD_ID=$(date +%s) &&
    echo "Build ID: $BUILD_ID" &&
    echo '--- Stamping service worker cache version...' &&
    sed -i "s/__BUILD_ID__/$BUILD_ID/g" sw.js &&
    echo '=== Build complete ==='
  """

[build.environment]
  NODE_VERSION = "18"

# Ensure boot-critical assets revalidate to avoid stale deploy mismatches.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
